<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertex Studio | Aesthetic Code Editor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link id="fontStylesheet" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap">

  <script src="https://cdn.tailwindcss.com"></script>

  <link id="prism-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>

  <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>

  <style>
    :root {
      --code-font:      'Fira Code', monospace;
      --code-font-size: 14px;
      --window-opacity: 0.25;
      --window-blur:    12px;
      --card-ratio:     1 / 1;
      --card-padding:   2.5rem;
      --slider-purple:  #a855f7;
      --slider-pink:    #ec4899;
      --slider-yellow:  #eab308;
    }

    .bg-sunset    { background: radial-gradient(circle at 20% 20%, #ff9a9e 0%, transparent 50%), radial-gradient(circle at 80% 80%, #fad0c4 0%, transparent 50%), linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); }
    .bg-cyberpunk { background: radial-gradient(circle at 0% 0%, #00f2fe 0%, transparent 50%), radial-gradient(circle at 100% 100%, #4facfe 0%, transparent 50%), linear-gradient(135deg, #0f0c29 0%, #302b63 100%); }
    .bg-ocean     { background: radial-gradient(circle at 100% 0%, #00c6ff 0%, transparent 60%), radial-gradient(circle at 0% 100%, #0072ff 0%, transparent 60%), linear-gradient(135deg, #005c97 0%, #363795 100%); }
    .bg-aurora    { background: radial-gradient(circle at 30% 30%, #43e97b 0%, transparent 40%), radial-gradient(circle at 70% 70%, #38f9d7 0%, transparent 40%), linear-gradient(135deg, #0ba360 0%, #3cba92 100%); }
    .bg-candy     { background: radial-gradient(circle at 15% 85%, #f953c6 0%, transparent 45%), radial-gradient(circle at 85% 15%, #b91d73 0%, transparent 45%), linear-gradient(135deg, #f953c6 0%, #b91d73 100%); }
    .bg-volcanic  { background: radial-gradient(circle at 50% 80%, #f7971e 0%, transparent 50%), radial-gradient(circle at 50% 10%, #ff4e50 0%, transparent 50%), linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }

    #captureArea {
      aspect-ratio: var(--card-ratio);
      padding:      var(--card-padding);
      font-family:  var(--code-font);
      transition:   aspect-ratio 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s ease, padding 0.3s ease;
    }

    .code-window {
      background:               rgba(15,23,42,var(--window-opacity));
      backdrop-filter:          blur(var(--window-blur));
      -webkit-backdrop-filter:  blur(var(--window-blur));
      border:                   1px solid rgba(255,255,255,0.18);
      box-shadow:               0 20px 60px -15px rgba(0,0,0,0.5);
      font-family:              inherit;
      transition:               background 0.2s, backdrop-filter 0.2s, transform 0.2s;
    }
    .code-window:hover { transform: translateY(-3px); }

    .code-window pre[class*="language-"],
    .code-window code[class*="language-"] {
      margin:      0 !important;
      padding:     0 !important;
      background:  transparent !important;
      font-family: var(--code-font) !important;
      font-size:   var(--code-font-size) !important;
      line-height: 1.65 !important;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6) !important;
      color:       #e2e8f0 !important;
      white-space: pre !important;        /* зберігає оригінальні відступи */
      word-break:  normal !important;
      overflow:    visible !important;
      display:     block !important;
    }

    /* ── Вікно коду: фіксована висота + красивий скрол ── */
    .window-body {
      max-height:    360px;
      overflow-y:    auto;
      overflow-x:    auto;
    }

    /* Кастомний скролбар — тонкий і скляний */
    .window-body::-webkit-scrollbar {
      width:  7px;
      height: 7px;
    }
    .window-body::-webkit-scrollbar-track {
      background:    rgba(255,255,255,0.04);
      border-radius: 99px;
      margin:        4px;
    }
    .window-body::-webkit-scrollbar-thumb {
      background:    rgba(255,255,255,0.18);
      border-radius: 99px;
      border:        2px solid transparent;
      background-clip: padding-box;
      transition:    background 0.2s;
    }
    .window-body::-webkit-scrollbar-thumb:hover {
      background:    rgba(255,255,255,0.38);
      background-clip: padding-box;
    }
    .window-body::-webkit-scrollbar-corner { background: transparent; }

    .exporting, .exporting * {
      transition:      none !important;
      animation:       none !important;
      scrollbar-width: none !important;
    }
    /* Під час експорту — розкриваємо весь контент без скролу */
    .exporting .window-body {
      max-height: none !important;
      overflow:   visible !important;
    }
    .exporting ::-webkit-scrollbar { display: none !important; }

    /* Traffic light labels */
    .traffic-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: 700; color: rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.15s; line-height: 1;
    }
    .window-header:hover .traffic-label { opacity: 1; }

    /* Toggle switch */
    .toggle-switch { display: inline-flex; align-items: center; cursor: pointer; user-select: none; }
    .toggle-switch input { display: none; }
    .toggle-track {
      position: relative; width: 44px; height: 24px;
      background: #374151; border-radius: 999px;
      transition: background 0.25s; border: 1px solid rgba(255,255,255,0.08);
    }
    .toggle-switch input:checked + .toggle-track { background: #7c3aed; }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toggle-switch input:checked + .toggle-track .toggle-thumb { transform: translateX(20px); }

    /* Sliders */
    .slider { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px; outline: none; cursor: pointer; background: #1f2937; box-shadow: inset 0 1px 3px rgba(0,0,0,0.4); }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; margin-top: -7px; transition: transform 0.15s, box-shadow 0.15s; }
    .slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; transition: transform 0.15s; }
    .slider::-webkit-slider-thumb:hover { transform: scale(1.25); }
    .slider:active::-webkit-slider-thumb { transform: scale(1.1); }
    .slider--purple { accent-color: var(--slider-purple); }
    .slider--purple::-webkit-slider-thumb { background: var(--slider-purple); box-shadow: 0 0 10px rgba(168,85,247,0.6); }
    .slider--pink { accent-color: var(--slider-pink); }
    .slider--pink::-webkit-slider-thumb { background: var(--slider-pink); box-shadow: 0 0 10px rgba(236,72,153,0.6); }
    .slider--yellow { accent-color: var(--slider-yellow); }
    .slider--yellow::-webkit-slider-thumb { background: var(--slider-yellow); box-shadow: 0 0 10px rgba(234,179,8,0.6); }

    .window-body::-webkit-scrollbar { height: 5px; width: 5px; }
    .window-body::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    .window-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .window-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4 sm:p-6">

  <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">

    <!-- 🛠️ Control Panel -->
    <section class="lg:col-span-5 bg-gray-900/70 backdrop-blur-xl rounded-2xl p-6 border border-white/10 shadow-2xl space-y-5">
      <h1 class="text-2xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-yellow-400">
        🎨 Code-to-Image
      </h1>

      <!-- Row 1: Font + Format -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Code Font</label>
          <select id="fontSelect" class="w-full bg-gray-800/80 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition">
            <option value="Fira Code"      data-url="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap">Fira Code</option>
            <option value="JetBrains Mono" data-url="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">JetBrains Mono</option>
            <option value="Source Code Pro" data-url="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&display=swap">Source Code Pro</option>
            <option value="IBM Plex Mono"  data-url="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap">IBM Plex Mono</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Format</label>
          <div class="flex gap-1 bg-gray-800/80 p-1 rounded-lg">
            <button class="ratio-btn flex-1 py-1.5 text-xs font-medium rounded-md bg-purple-500/20 text-purple-300 transition" data-ratio="1">1:1</button>
            <button class="ratio-btn flex-1 py-1.5 text-xs font-medium rounded-md hover:bg-purple-500 hover:text-white transition" data-ratio="1.777">16:9</button>
            <button class="ratio-btn flex-1 py-1.5 text-xs font-medium rounded-md hover:bg-purple-500 hover:text-white transition" data-ratio="0.562">9:16</button>
          </div>
        </div>
      </div>

      <!-- Row 2: Language + Syntax Theme -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Language</label>
          <select id="languageSelect" class="w-full bg-gray-800/80 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition">
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="python">Python</option>
            <option value="css">CSS</option>
            <option value="rust">Rust</option>
            <option value="go">Go</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Syntax Theme</label>
          <select id="prismThemeSelect" class="w-full bg-gray-800/80 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition">
            <option value="prism-tomorrow">Tomorrow Night</option>
            <option value="prism-okaidia">Okaidia</option>
            <option value="prism-twilight">Twilight</option>
            <option value="prism-dark">Dark</option>
            <option value="prism-coy">Coy (Light)</option>
          </select>
        </div>
      </div>

      <!-- Glass Controls -->
      <div class="space-y-4 bg-gray-800/40 p-4 rounded-xl border border-white/5">
        <div class="flex justify-between items-center">
          <label class="text-xs font-medium text-gray-300">🌫️ Background Blur</label>
          <span id="blurVal" class="text-xs font-mono bg-gray-700 px-2 py-0.5 rounded">12px</span>
        </div>
        <input type="range" id="blurRange" min="0" max="40" step="1" value="12" class="slider slider--purple w-full">

        <div class="flex justify-between items-center">
          <label class="text-xs font-medium text-gray-300">💧 Window Opacity</label>
          <span id="opacityVal" class="text-xs font-mono bg-gray-700 px-2 py-0.5 rounded">0.25</span>
        </div>
        <input type="range" id="opacityRange" min="0.05" max="0.9" step="0.05" value="0.25" class="slider slider--pink w-full">

        <div class="flex justify-between items-center">
          <label class="text-xs font-medium text-gray-300">🔤 Font Size</label>
          <span id="fontSizeVal" class="text-xs font-mono bg-gray-700 px-2 py-0.5 rounded">14px</span>
        </div>
        <input type="range" id="fontSizeRange" min="10" max="22" step="1" value="14" class="slider slider--yellow w-full">
      </div>

      <!-- Background Theme -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Background Theme</label>
        <select id="gradientSelect" class="w-full bg-gray-800/80 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition">
          <option value="sunset">🌅 Sunset</option>
          <option value="cyberpunk">🤖 Cyberpunk</option>
          <option value="ocean">🌊 Ocean</option>
          <option value="aurora">🌌 Aurora</option>
          <option value="candy">🍬 Candy</option>
          <option value="volcanic">🌋 Volcanic</option>
        </select>
      </div>

      <!-- Code Input -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">Source Code</label>
        <textarea id="codeInput"
          class="w-full h-40 bg-black/40 border border-gray-700/50 rounded-xl p-3 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-purple-500/50 resize-y transition"
          spellcheck="false">const greeting = "Hello, World! 🌍";
console.log(greeting);

function calculateSum(a, b) {
  return a + b;
}</textarea>
      </div>

      <!-- Window Controls Toggle -->
      <div class="flex items-center justify-between bg-gray-800/40 px-4 py-3 rounded-xl border border-white/5">
        <span class="text-xs font-medium text-gray-300">🔴🟡🟢 Window Controls</span>
        <label class="toggle-switch">
          <input type="checkbox" id="windowControlsToggle" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3">
        <button id="randomizeBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-medium py-2.5 rounded-xl transition active:scale-95">
          🎲 Random Mesh
        </button>
        <button id="downloadBtn" class="flex-[2] bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-2.5 rounded-xl shadow-lg shadow-purple-500/20 transition active:scale-95">
          📥 Export 2x PNG
        </button>
      </div>

      <!-- Watermark -->
      <div class="flex items-center gap-2 pt-2">
        <span class="text-xs text-gray-400">Watermark:</span>
        <input type="text" id="watermarkInput" placeholder="@your_handle"
          class="flex-1 bg-transparent border-b border-gray-600 text-sm py-1 focus:outline-none focus:border-purple-400 transition" maxlength="24">
      </div>
    </section>

    <!-- 👁️ Preview Area -->
    <section class="lg:col-span-7 flex items-center justify-center sticky top-6">
      <div id="captureArea" class="preview-card relative w-full rounded-3xl overflow-hidden shadow-2xl flex items-center justify-center bg-sunset">

        <div class="code-window w-full rounded-xl overflow-hidden">
          <div id="windowHeader" class="window-header flex items-center gap-2 px-4 py-3 bg-white/5 border-b border-white/10">
            <div class="traffic-lights flex items-center gap-1.5">
              <div class="w-3 h-3 rounded-full bg-[#ff5f56] relative"><span class="traffic-label">✕</span></div>
              <div class="w-3 h-3 rounded-full bg-[#ffbd2e] relative"><span class="traffic-label">−</span></div>
              <div class="w-3 h-3 rounded-full bg-[#27c93f] relative"><span class="traffic-label">+</span></div>
            </div>
            <span id="windowTitle" class="ml-3 text-xs font-medium text-white/60 tracking-wide">script.js</span>
          </div>
          <div class="window-body p-5">
            <pre class="m-0 p-0 bg-transparent"><code id="codePreview" class="language-javascript"></code></pre>
          </div>
        </div>

        <div id="watermarkDisplay" class="absolute bottom-4 right-5 text-xs text-white/70 font-mono select-none drop-shadow-md tracking-wider"></div>
      </div>
    </section>
  </main>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const codeInput            = document.getElementById('codeInput');
  const codePreview          = document.getElementById('codePreview');
  const gradientSelect       = document.getElementById('gradientSelect');
  const languageSelect       = document.getElementById('languageSelect');
  const prismThemeSelect     = document.getElementById('prismThemeSelect');
  const watermarkInput       = document.getElementById('watermarkInput');
  const watermarkDisplay     = document.getElementById('watermarkDisplay');
  const windowTitle          = document.getElementById('windowTitle');
  const windowHeader         = document.getElementById('windowHeader');
  const captureArea          = document.getElementById('captureArea');
  const downloadBtn          = document.getElementById('downloadBtn');
  const prismThemeLink       = document.getElementById('prism-theme');
  const fontSelect           = document.getElementById('fontSelect');
  const fontStylesheet       = document.getElementById('fontStylesheet');
  const blurRange            = document.getElementById('blurRange');
  const opacityRange         = document.getElementById('opacityRange');
  const fontSizeRange        = document.getElementById('fontSizeRange');
  const ratioBtns            = document.querySelectorAll('.ratio-btn');
  const randomizeBtn         = document.getElementById('randomizeBtn');
  const windowControlsToggle = document.getElementById('windowControlsToggle');
  const blurVal              = document.getElementById('blurVal');
  const opacityVal           = document.getElementById('opacityVal');
  const fontSizeVal          = document.getElementById('fontSizeVal');

  const EXTENSIONS = { javascript:'js', typescript:'ts', python:'py', css:'css', rust:'rs', go:'go' };

  // ── Авто-детекція мови ──────────────────────────────────────────────────
  // Кожен запис: { lang, score: fn(code) → число }
  // Перемагає той, хто набрав найбільше очок.
  const DETECTORS = [
    {
      lang: 'python',
      score: c => {
        let s = 0;
        if (/^\s*def\s+\w+\s*\(/m.test(c))        s += 10; // def func():
        if (/^\s*class\s+\w+[\s:(]/m.test(c))      s += 8;  // class Foo:
        if (/:\s*$/.test(c))                        s += 4;  // рядок що закінч на :
        if (/^\s*import\s+\w/m.test(c))             s += 5;
        if (/^\s*from\s+\w+\s+import/m.test(c))    s += 7;
        if (/print\s*\(/.test(c))                   s += 5;
        if (/#.*$/.test(c))                         s += 2;  // # коментар
        if (/"""[\s\S]*?"""/.test(c))               s += 6;  // docstring
        if (/\bself\b/.test(c))                     s += 8;
        if (/elif\b/.test(c))                       s += 9;
        if (/^\s*@\w+/m.test(c))                    s += 4;  // декоратор
        if (/\bTrue\b|\bFalse\b|\bNone\b/.test(c)) s += 6;
        if (/\blambda\b/.test(c))                   s += 5;
        // Мінус якщо є JS-специфіка
        if (/\bconst\b|\blet\b|\bvar\b/.test(c))   s -= 8;
        if (/=>\s*{/.test(c))                       s -= 6;
        return s;
      }
    },
    {
      lang: 'typescript',
      score: c => {
        let s = 0;
        if (/:\s*(string|number|boolean|any|void|never|unknown)\b/.test(c)) s += 10;
        if (/interface\s+\w+/.test(c))             s += 10;
        if (/type\s+\w+\s*=/.test(c))              s += 9;
        if (/<\w+>/.test(c))                        s += 5;  // generics
        if (/\?\s*:/.test(c))                       s += 6;  // optional prop
        if (/readonly\b/.test(c))                  s += 7;
        if (/as\s+\w+/.test(c))                    s += 4;  // type cast
        if (/enum\s+\w+/.test(c))                  s += 9;
        if (/\bconst\b|\blet\b/.test(c))           s += 2;
        if (/=>\s*{/.test(c))                      s += 3;
        return s;
      }
    },
    {
      lang: 'css',
      score: c => {
        let s = 0;
        if (/[\w\-]+\s*:\s*[\w\-#%().,\s"']+;/.test(c)) s += 8; // property: value;
        if (/\{[\s\S]*?\}/.test(c))                       s += 6;
        if (/^[\s]*[.#][\w\-]+/m.test(c))                s += 7; // .class / #id
        if (/@media\b/.test(c))                           s += 9;
        if (/@keyframes\b/.test(c))                       s += 9;
        if (/:hover|:focus|:root|::before/.test(c))       s += 7;
        if (/var\(--/.test(c))                            s += 8;
        if (/^\s*\/\*[\s\S]*?\*\//m.test(c))             s += 3;
        if (/\bconst\b|\bfunction\b|\breturn\b/.test(c)) s -= 10;
        return s;
      }
    },
    {
      lang: 'rust',
      score: c => {
        let s = 0;
        if (/\bfn\s+\w+/.test(c))                  s += 10;
        if (/\blet\s+mut\b/.test(c))               s += 10;
        if (/\bimpl\b/.test(c))                    s += 9;
        if (/\bpub\s+(fn|struct|enum|mod)\b/.test(c)) s += 10;
        if (/->/.test(c))                           s += 3;
        if (/\bmatch\b/.test(c))                   s += 8;
        if (/::/.test(c))                          s += 4;
        if (/\bOption<|Result</.test(c))           s += 9;
        if (/\buse\s+\w+::/.test(c))              s += 8;
        if (/#\[derive/.test(c))                   s += 10;
        if (/println!\(/.test(c))                  s += 8;
        if (/\bstruct\s+\w+/.test(c))             s += 7;
        return s;
      }
    },
    {
      lang: 'go',
      score: c => {
        let s = 0;
        if (/^package\s+\w+/m.test(c))            s += 12;
        if (/^import\s+\(/m.test(c))              s += 10;
        if (/\bfunc\s+\w+/.test(c))              s += 10;
        if (/:=/.test(c))                         s += 8;
        if (/\bfmt\.\w+\(/.test(c))             s += 9;
        if (/\bgoroutine\b|\bgo\s+func/.test(c)) s += 10;
        if (/\bchan\b/.test(c))                  s += 9;
        if (/\bdefer\b/.test(c))                 s += 7;
        if (/\binterface\s*\{/.test(c))          s += 6;
        if (/\bmap\[/.test(c))                   s += 5;
        return s;
      }
    },
    {
      lang: 'javascript',
      score: c => {
        let s = 0;
        if (/\bconst\b|\blet\b|\bvar\b/.test(c))  s += 5;
        if (/=>\s*[{(]/.test(c))                   s += 7;  // arrow fn
        if (/\bfunction\b/.test(c))                s += 5;
        if (/\bconsole\.\w+\(/.test(c))           s += 8;
        if (/\bdocument\.\w+/.test(c))            s += 8;
        if (/\bwindow\.\w+/.test(c))              s += 7;
        if (/\basync\b|\bawait\b/.test(c))        s += 5;
        if (/\bnew\s+Promise/.test(c))            s += 6;
        if (/`[\s\S]*?\$\{/.test(c))             s += 7;  // template literal
        if (/\brequire\s*\(/.test(c))            s += 6;
        if (/module\.exports/.test(c))            s += 7;
        if (/import\s+.*from\s+['"]/.test(c))    s += 6;
        if (/\/\/.*$/.test(c))                   s += 2;
        return s;
      }
    },
  ];

  /**
   * Повертає назву мови з найвищим score.
   * Якщо всі ≤ 0 — повертає 'javascript' як дефолт.
   */
  function detectLanguage(code) {
    if (!code.trim()) return null;
    let best = { lang: 'javascript', score: 0 };
    for (const d of DETECTORS) {
      const s = d.score(code);
      if (s > best.score) best = { lang: d.lang, score: s };
    }
    return best.lang;
  }

  // Debounce щоб не детектити на кожен символ
  let detectTimer = null;
  function scheduleDetect() {
    clearTimeout(detectTimer);
    detectTimer = setTimeout(() => {
      const detected = detectLanguage(codeInput.value);
      if (detected && detected !== languageSelect.value) {
        languageSelect.value = detected;
        applyLanguage(detected);
        // Показуємо мінімальний тост
        showLangToast(detected);
      }
    }, 600); // 600мс після останнього символу
  }

  // Маленький тост "Detected: Python"
  function showLangToast(lang) {
    let toast = document.getElementById('langToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'langToast';
      toast.style.cssText = `
        position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
        background:rgba(30,20,50,0.92); backdrop-filter:blur(12px);
        border:1px solid rgba(168,85,247,0.4); color:#d8b4fe;
        padding:7px 16px; border-radius:999px; font-size:12px;
        font-family:monospace; letter-spacing:0.05em;
        box-shadow:0 4px 20px rgba(0,0,0,0.4);
        transition:opacity 0.3s; z-index:9999; pointer-events:none;
      `;
      document.body.appendChild(toast);
    }
    toast.textContent = '🔍 Detected: ' + lang;
    toast.style.opacity = '1';
    clearTimeout(toast._hide);
    toast._hide = setTimeout(() => toast.style.opacity = '0', 2000);
  }

  const PRISM_THEMES = {
    'prism-tomorrow': 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css',
    'prism-okaidia':  'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css',
    'prism-twilight': 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css',
    'prism-dark':     'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-dark.min.css',
    'prism-coy':      'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-coy.min.css',
  };

  const ALL_GRADIENTS = ['bg-sunset','bg-cyberpunk','bg-ocean','bg-aurora','bg-candy','bg-volcanic'];

  // ── Update preview (called on every keystroke) ──
  function updatePreview() {
    codePreview.textContent = codeInput.value;
    if (window.Prism) Prism.highlightElement(codePreview);
    scheduleDetect(); // авто-детекція з debounce
  }

  // ── Language ──
  function applyLanguage(lang) {
    codePreview.className = codePreview.className
      .split(' ').filter(c => !c.startsWith('language-')).join(' ');
    codePreview.classList.add('language-' + lang);
    windowTitle.textContent = 'script.' + (EXTENSIONS[lang] || 'txt');
    if (window.Prism) Prism.highlightElement(codePreview);
  }
  languageSelect.addEventListener('change', () => applyLanguage(languageSelect.value));

  // ── Prism theme ──
  prismThemeSelect.addEventListener('change', () => {
    const url = PRISM_THEMES[prismThemeSelect.value];
    if (!url) return;
    prismThemeLink.href = url;
    prismThemeLink.onload = () => { if (window.Prism) Prism.highlightElement(codePreview); };
  });

  // ── Gradient ──
  function updateGradient() {
    captureArea.classList.remove(...ALL_GRADIENTS);
    captureArea.classList.add('bg-' + gradientSelect.value);
    captureArea.style.removeProperty('background');
  }
  gradientSelect.addEventListener('change', updateGradient);

  // ── Sliders ──
  blurRange.addEventListener('input', e => {
    captureArea.style.setProperty('--window-blur', e.target.value + 'px');
    blurVal.textContent = e.target.value + 'px';
  });
  opacityRange.addEventListener('input', e => {
    captureArea.style.setProperty('--window-opacity', e.target.value);
    opacityVal.textContent = parseFloat(e.target.value).toFixed(2);
  });
  fontSizeRange.addEventListener('input', e => {
    captureArea.style.setProperty('--code-font-size', e.target.value + 'px');
    fontSizeVal.textContent = e.target.value + 'px';
  });

  // ── Font loading ──
  fontSelect.addEventListener('change', e => {
    const opt    = e.target.selectedOptions[0];
    const family = opt.value;
    const url    = opt.dataset.url;
    if (url) fontStylesheet.href = url;
    captureArea.style.setProperty('--code-font', "'" + family + "', monospace");
    document.fonts.load('400 14px "' + family + '"').then(() => {
      if (window.Prism) Prism.highlightElement(codePreview);
    });
  });

  // ── Ratio ──
  const RATIOS = { '1':{'aspect':'1/1','pad':'2.5rem'}, '1.777':{'aspect':'16/9','pad':'3rem'}, '0.562':{'aspect':'9/16','pad':'2rem'} };
  ratioBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      ratioBtns.forEach(b => b.classList.remove('bg-purple-500/20','text-purple-300'));
      btn.classList.add('bg-purple-500/20','text-purple-300');
      const r = RATIOS[btn.dataset.ratio];
      captureArea.style.setProperty('--card-ratio', r.aspect);
      captureArea.style.setProperty('--card-padding', r.pad);
    });
  });

  // ── Window controls toggle ──
  windowControlsToggle.addEventListener('change', e => {
    const lights = windowHeader.querySelector('.traffic-lights');
    if (lights) lights.style.visibility = e.target.checked ? 'visible' : 'hidden';
  });

  // ── Mesh gradient randomizer ──
  function rndHSL() {
    return 'hsl(' + Math.floor(Math.random()*360) + ',' + (70+Math.floor(Math.random()*25)) + '%,' + (45+Math.floor(Math.random()*20)) + '%)';
  }
  function buildMesh() {
    const n = 3 + Math.floor(Math.random()*2);
    const layers = [];
    for (let i = 0; i < n; i++) {
      const x = 10+Math.floor(Math.random()*80), y = 10+Math.floor(Math.random()*80);
      const s = 30+Math.floor(Math.random()*40);
      layers.push('radial-gradient(circle at '+x+'% '+y+'%, '+rndHSL()+' 0%, transparent '+s+'%)');
    }
    const bh = Math.floor(Math.random()*360);
    layers.push('linear-gradient(135deg, hsl('+bh+',30%,10%) 0%, hsl('+((bh+30)%360)+',30%,18%) 100%)');
    return layers.join(', ');
  }
  randomizeBtn.addEventListener('click', () => {
    captureArea.classList.remove(...ALL_GRADIENTS);
    captureArea.style.background = buildMesh();
  });

  // ── Watermark ──
  watermarkInput.addEventListener('input', e => {
    watermarkDisplay.textContent = e.target.value.trim();
  });

  // ── Export ──
  downloadBtn.addEventListener('click', async () => {
    if (!window.htmlToImage) { alert('Export library still loading, try again.'); return; }

    const orig = downloadBtn.innerHTML;
    downloadBtn.innerHTML = '⏳ Rendering…';
    downloadBtn.disabled = true;
    captureArea.classList.add('exporting');

    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 80));

    try {
      const dataUrl = await htmlToImage.toPng(captureArea, {
        quality: 1, pixelRatio: 2, cacheBust: true,
        style: { fontFamily: getComputedStyle(captureArea).fontFamily },
      });
      const a = document.createElement('a');
      a.download = 'code-card-' + Date.now() + '.png';
      a.href = dataUrl;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } catch(err) {
      console.error(err); alert('Export failed. See console (F12).');
    } finally {
      captureArea.classList.remove('exporting');
      downloadBtn.innerHTML = orig;
      downloadBtn.disabled = false;
    }
  });

  // ── INIT ──
  updateGradient();
  applyLanguage(languageSelect.value);
  updatePreview();

  // Live update on every keystroke
  codeInput.addEventListener('input', updatePreview);
});
</script>
</body>
